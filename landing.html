<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Smart</title>

<style>
body {
  background: #1f2433;
  color: white;
  font-family: "Segoe UI", Arial, sans-serif;
  text-align: center;
  padding: 30px;
  margin: 0;
}

.container {
  max-width: 700px;
  margin: auto;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

p {
  font-size: 18px;
  line-height: 1.6;
}

.botao {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 25px;
  background: #00a8ff;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
}

.card {
  background: #2b3145;
  padding: 20px;
  border-radius: 8px;
  margin-top: 20px;
}
</style>
</head>

<body>
<div class="container">
  <h1>Control Smart</h1>

  <p>Controle financeiro simples, rapido e moderno.</p>

  <a class="botao" href="https://paulorobertoribeiro.github.io/control-smart-app/">
    Abrir aplicativo
  </a>

  <div class="card">
    <h2>Recursos</h2>
    <p>
      Entradas e saidas<br>
      Valores a receber<br>
      Historico automatico<br>
      Multilingue<br>
      Instalacao no celular<br>
      Funciona offline
    </p>
  </div>

  <div class="card">
    <h2>Instalar</h2>
    <p>Abra no Chrome, toque no menu e escolha Adicionar a tela inicial.</p>
  </div>
</div>
</body>
</html>
